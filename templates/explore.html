{% extends "base.html" %}

{% block content %}
<div class="explore-container">
    <aside class="filter-sidebar">
        <h3>Filtros</h3>
        <form action="{{ url_for('explore') }}" method="GET">
            <div class="filter-group">
                <label>Tipo</label>
                <select name="type" id="media-type-select" class="custom-select">
                    <option value="tv" {% if media_type == 'tv' %}selected{% endif %}>Series</option>
                    <option value="movie" {% if media_type == 'movie' %}selected{% endif %}>Películas</option>
                    <option value="show" {% if media_type == 'show' %}selected{% endif %}>Programas</option>
                </select>
            </div>

            <div class="filter-group" id="status-filter-group" {% if media_type == 'movie' %}style="display:none"{% endif %}>
                <label>Estado</label>
                <select name="status" class="custom-select">
                    <option value="">Todos</option>
                    {% for sid, sname in status_options.items() %}
                        <option value="{{ sid }}" {% if current_status_id == sid %}selected{% endif %}>{{ sname }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="filter-group">
                <label>País</label>
                <select name="lang" class="custom-select">
                    <option value="">Todos</option>
                    {% if asia_langs %}
                        {% for code, name in asia_langs.items() %}
                        <option value="{{ code }}" {% if current_lang == code %}selected{% endif %}>{{ name }}</option>
                        {% endfor %}
                    {% endif %}
                </select>
            </div>

            <div class="filter-group">
                <label>Género</label>
                <select name="genre" class="custom-select">
                    <option value="">Todos</option>
                    {% for gid, gname in genres.items() %}
                        <option value="{{ gid }}" {% if current_genre == gid %}selected{% endif %}>{{ gname }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="filter-group">
                <label>Ordenar por</label>
                <select name="sort_by" class="custom-select">
                    {% for val, label in sort_options.items() %}
                        <option value="{{ val }}" {% if current_sort == val %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="filter-group">
                <label>Año</label>
                <input type="number" name="year" value="{{ current_year }}" placeholder="Ej: 2024" class="no-spin">
            </div>

            <button type="submit" class="apply-filters-btn">Aplicar Filtros</button>
        </form>
    </aside>

    <div class="explore-results">
        <!-- CARGADOR (FAROLILLO) -->
        <div id="explore-loader" class="loading-overlay" style="display: none;">
            <div class="lantern-animation">
                <div class="lantern">
                    <div class="lantern-top"></div>
                    <div class="lantern-body"><div class="lantern-glow"></div></div>
                    <div class="lantern-bottom"></div>
                </div>
                <p class="loading-text">Sincronizando con Asia<span>...</span></p>
            </div>
        </div>

        <div id="items-container" class="collection-grid">
            <!-- Los items se cargarán por AJAX -->
        </div>

        <div id="load-more-wrapper" class="load-more-wrapper" style="display: none;">
            <button id="load-more-btn" data-page="1">Ver más</button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('items-container');
    const loader = document.getElementById('explore-loader');
    const loadMoreBtn = document.getElementById('load-more-btn');
    const loadMoreWrapper = document.getElementById('load-more-wrapper');
    
    // Capturamos filtros actuales de la URL de Python/Jinja
    const filters = {
        type: '{{ media_type }}',
        year: '{{ current_year }}',
        lang: '{{ current_lang }}',
        genre: '{{ current_genre }}',
        sort_by: '{{ current_sort }}',
        status: '{{ current_status_id }}'
    };

    let currentPage = 1;

    // Función principal para cargar items
    function loadItems(page = 1, append = false) {
        if (!append) {
            container.innerHTML = '';
            // Retraso inteligente para el farolillo
            setTimeout(() => { if(container.innerHTML === '') loader.style.display = 'flex'; }, 200);
        }
        
        const params = new URLSearchParams({...filters, page: page});

        fetch(`/api/explore?${params.toString()}`)
            .then(res => res.json())
            .then(data => {
                loader.style.display = 'none';
                if (append) {
                    container.insertAdjacentHTML('beforeend', data.html);
                } else {
                    container.innerHTML = data.html;
                }
                
                currentPage = data.next_api_page;
                loadMoreBtn.setAttribute('data-page', currentPage);
                
                // Si tragas menos de 20 es que no hay más
                if (data.html.trim() === "" || (data.html.match(/card-link/g) || []).length < 20) {
                    loadMoreWrapper.style.display = 'none';
                } else {
                    loadMoreWrapper.style.display = 'block';
                }
            })
            .catch(err => {
                loader.style.display = 'none';
                container.innerHTML = "<p>Error al cargar resultados.</p>";
            });
    }

    // Carga inicial
    loadItems(1);

    // Botón Ver Más
    loadMoreBtn.addEventListener('click', () => loadItems(currentPage, true));
});
</script>
{% endblock %}
