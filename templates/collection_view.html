{% extends "base.html" %}
{% block title %}{{ display_name }} - SHIORI{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/collection_view.css') }}">
{% endblock %}

{% block content %}

<div class="cast-page-container">
    <a href="{{ url_for('collections') }}" class="back-link-premium">
        <i class="fas fa-arrow-left"></i>
        <span>Volver a Colecciones</span>
    </a>

    <div class="cast-header-wrapper">
        <header class="cast-main-header">
            <div class="header-text">
                <h1 class="cast-title">{{ display_name }}</h1>
                <p class="subtitle-premium">Listado completo de tu selección personal 🏮</p>
            </div>
        </header>
    </div>
    <div id="ajax-collection-container">
        {% include 'partials/collection_grid.html' %}
    </div>
</div>

<script src="{{ url_for('static', filename='js/collection_view.js') }}"></script>

{% endblock %}
