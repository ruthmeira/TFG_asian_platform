{% extends "base.html" %}

{% block title %}Inicio - AsianPlatform{% endblock %}

{% block content %}

<div class="home-header">
    <div class="title-section">
        <h1>Explorar Tendencias</h1>
        <p>Lo que está en tendencia de Asia</p>
    </div>
    <div class="filter-controls">
        <a href="{{ url_for('home', window='day') }}" class="filter-btn {{ 'active' if active_window == 'day' }}">Hoy</a>
        <a href="{{ url_for('home', window='week') }}" class="filter-btn {{ 'active' if active_window == 'week' }}">Esta Semana</a>
    </div>
</div>

<!-- CONTENEDOR DE CARGA (FAROLILLO ASIÁTICO) CON RETRASO INTELIGENTE -->
<div id="loading-overlay" class="loading-overlay" style="display: none;">
    <div class="lantern-animation">
        <div class="lantern">
            <div class="lantern-top"></div>
            <div class="lantern-body">
                <div class="lantern-glow"></div>
            </div>
            <div class="lantern-bottom"></div>
        </div>
        <p class="loading-text">Sincronizando con Asia<span>...</span></p>
    </div>
</div>

<div id="main-content" style="opacity: 0; transition: opacity 0.4s ease;">
    <section class="content-section">
        <h2>📺 Top 20 Series</h2>
        <div id="carousel-series" class="carousel"></div>
    </section>

    <section class="content-section">
        <h2>🎬 Top 20 Películas</h2>
        <div id="carousel-movies" class="carousel"></div>
    </section>

    <section class="content-section">
        <h2>🌟 Top 20 Programas</h2>
        <div id="carousel-shows" class="carousel"></div>
    </section>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const windowType = "{{ active_window }}";
    const overlay = document.getElementById('loading-overlay');
    const mainContent = document.getElementById('main-content');
    
    // Sólo mostramos el farolillo si la carga tarda más de 200ms (Evita parpadeos en caché)
    const showLoaderTimeout = setTimeout(() => {
        overlay.style.display = 'flex';
    }, 200);

    fetch(`/api/trending?window=${windowType}`)
        .then(response => response.json())
        .then(data => {
            clearTimeout(showLoaderTimeout); // Si llega rápido, cancelamos el farolillo
            
            renderCarousel('carousel-series', data.series, 'tv', 'Serie');
            renderCarousel('carousel-movies', data.movies, 'movie', 'Película');
            renderCarousel('carousel-shows', data.shows, 'tv', 'Programa');

            overlay.style.display = 'none';
            mainContent.style.opacity = '1';
        })
        .catch(err => {
            clearTimeout(showLoaderTimeout);
            console.error("Error cargando tendencias:", err);
            overlay.style.display = 'flex';
            overlay.innerHTML = "<p>Error al sincronizar con TMDB. Recarga la página.</p>";
        });

    function renderCarousel(id, items, type, label) {
        const container = document.getElementById(id);
        if (!items || items.length === 0) {
            container.innerHTML = "<p>No se encontraron resultados.</p>";
            return;
        }

        container.innerHTML = items.map(item => `
            <a href="/media/${type}/` + item.id + `" class="card-link">
                <div class="card">
                    <div class="badge">${label}</div>
                    <img src="https://image.tmdb.org/t/p/w500` + item.poster_path + `" alt="` + (item.name || item.title) + `">
                    <div class="card-body">
                        <h4>` + (item.name || item.title) + `</h4>
                        <h6>` + (item.original_name || item.original_title) + `</h6>
                        <div class="card-meta">
                            <span class="rating">⭐ ` + parseFloat(item.vote_average || 0).toFixed(1) + `</span>
                            <span class="lang">` + (item.flag || '🌏') + `</span>
                        </div>
                    </div>
                </div>
            </a>
        `).join('');
    }
});
</script>

{% endblock %}
