{% for work in known_for %}
<a href="{{ url_for('media_detail', media_type=work.media_type_fixed, media_id=work.id) }}"
    class="card-link">
    <div class="card">
        <div class="badge">{{ work.tipo_label }}</div>
        <img src="{% if work.poster_path %}https://image.tmdb.org/t/p/w185{{ work.poster_path }}{% else %}{{ url_for('static', filename='img/no-poster.png') }}{% endif %}" alt="{{ work.display_title }}">
        <div class="card-body">
            <h4>{{ work.display_title }}</h4>
            <h6>{{ work.original_title_h6 }}</h6>
            <div class="card-meta">
                <div class="ratings-group">
                    <span class="rating">⭐ {{ (work.vote_average or 0)|round(1) }}</span>
                    <span class="shiori-rating"><i class="fas fa-heart"></i> {{ (work.shiori_rating or 0.0)|round(1) }}</span>
                </div>
                <span class="lang">{{ work.flag }}</span>
            </div>
        </div>
    </div>
</a>
{% else %}
<div class="no-projects-msg">
    <i class="fas fa-video-slash"></i>
    <p>No se han encontrado proyectos asiáticos registrados de momento.</p>
</div>
{% endfor %}
