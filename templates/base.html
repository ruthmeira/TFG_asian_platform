<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Asian Platform{% endblock %}</title>
    
    <!-- Google Fonts: Outfit & Noto Color Emoji -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    <!-- NAVBAR -->
    <header class="navbar">
        <div class="navbar-wrapper">
            <div class="logo">
                <i class="fas fa-torii-gate"></i> Asian<span>Platform</span>
            </div>

            <nav class="nav-links">
                <a href="{{ url_for('home') }}" class="{{ 'active' if request.endpoint == 'home' }}"><i class="fas fa-home"></i> Inicio</a>
                <a href="{{ url_for('explore') }}" class="{{ 'active' if request.endpoint == 'explore' }}"><i class="fas fa-compass"></i> Explorar</a>
                {% if current_user.is_authenticated %}
                    <a href="{{ url_for('collections') }}" class="{{ 'active' if request.endpoint == 'collections' }}"><i class="fas fa-layer-group"></i> Colecciones</a>
                    <a href="{{ url_for('profile') }}" class="{{ 'active' if request.endpoint == 'profile' }}"><i class="fas fa-user-circle"></i> Mi Perfil</a>
                {% else %}
                    <a href="{{ url_for('login') }}" class="login-btn"><i class="fas fa-sign-in-alt"></i> Entrar</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <!-- CONTENIDO DINÁMICO -->
    <main class="{{ 'auth-page-wrapper' if request.endpoint in ['login', 'register', 'forgot_password', 'reset_password'] else 'container' }}">
        {% block content %}
        {% endblock %}
    </main>

    <!-- FOOTER SIMPLE -->
    <footer class="footer">
        <div class="footer-simple">
            <div class="logo">
                <i class="fas fa-torii-gate"></i> Asian<span>Platform</span>
            </div>
            <p>&copy; 2026 AsianPlatform - Proyecto TFG. Hecho con ❤️ para los fans de Asia.</p>
        </div>
    </footer>

</body>
</html>
