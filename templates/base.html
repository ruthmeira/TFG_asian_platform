<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Asian Platform{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
</head>
<body>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">
            AsianPlatform
        </div>

        <div>
            <a href="{{ url_for('home') }}">Inicio</a>
            <a href="{{ url_for('explore') }}">Explorar</a>
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('collections') }}">Colecciones</a>
                <a href="{{ url_for('profile') }}">Mi Perfil</a>
            {% else %}
                <a href="{{ url_for('login') }}">Login/Registro</a>
            {% endif %}
        </div>
    </div>

    <!-- CONTENIDO DINÁMICO -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        © 2026 AsianPlatform - Proyecto TFG
    </footer>

</body>
</html>
