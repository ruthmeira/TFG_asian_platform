{% extends "base.html" %}

{% block title %}Registro{% endblock %}

{% block content %}

<div class="matrix-container" style="justify-content: space-between; padding: 0 1%;">
    <div class="matrix-column" style="animation-duration: 4s; animation-delay: 0.2s;">龙 爱 美 中</div>
    <div class="matrix-column" style="animation-duration: 3.2s; animation-delay: 1.1s;">あ い う え</div>
    <div class="matrix-column" style="animation-duration: 5s; animation-delay: 0.7s;">ㄱ ㄴ ㄷ ㄹ</div>
    <div class="matrix-column" style="animation-duration: 4.8s; animation-delay: 1.9s;">สวัสดี ช ซ</div>
    <div class="matrix-column" style="animation-duration: 6s; animation-delay: 1.5s;">永 和 龙</div>
    <div class="matrix-column" style="animation-duration: 3.5s; animation-delay: 0.8s;">カ キ ク ケ</div>
    <div class="matrix-column" style="animation-duration: 5.5s; animation-delay: 0.3s;">中 国 大</div>
    <div class="matrix-column" style="animation-duration: 4.2s; animation-delay: 2.1s;">さ し す</div>
    <div class="matrix-column" style="animation-duration: 3.9s; animation-delay: 1.0s;">ว ส ด ี</div>
    <div class="matrix-column" style="animation-duration: 5.8s; animation-delay: 0.6s;">永 和 龙</div>
    <div class="matrix-column" style="animation-duration: 4.1s; animation-delay: 1.4s;">み な さ</div>
    <div class="matrix-column" style="animation-duration: 3.6s; animation-delay: 0.1s;">龙 爱 美</div>
    <div class="matrix-column" style="animation-duration: 5.2s; animation-delay: 2.3s;">ㄱ ㄴ ㄷ</div>
    <div class="matrix-column" style="animation-duration: 4.4s; animation-delay: 0.9s;">中 国 龙</div>
    <div class="matrix-column" style="animation-duration: 6.5s; animation-delay: 1.3s;">あ い う</div>
</div>

<div class="auth-card">
    <h2>Unirse</h2>

    <form method="POST">
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" name="username" placeholder="Usuario" required>
        </div>
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="Email" required>
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Contraseña" required>
        </div>
        <button type="submit">Crear Cuenta</button>
    </form>

    <div class="auth-footer-links">
        <a href="{{ url_for('login') }}">¿Ya eres miembro? Inicia sesión</a>
    </div>
</div>

{% endblock %}
